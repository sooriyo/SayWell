name: SayWell
options:
  bundleIdPrefix: dev.saywell
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""

targets:
  SayWell:
    type: application
    platform: iOS
    sources:
      - path: SayWell
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.saywell.app
        INFOPLIST_KEY_CFBundleDisplayName: SayWell
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentTeal
        CODE_SIGN_ENTITLEMENTS: SayWell/SayWell.entitlements
    entitlements:
      path: SayWell/SayWell.entitlements
    dependencies:
      - target: SayWellKeyboard

  SayWellKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: SayWellKeyboard
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.saywell.app.keyboard
        INFOPLIST_FILE: SayWellKeyboard/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: SayWellKeyboard/SayWellKeyboard.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: SayWellKeyboard/SayWellKeyboard.entitlements
